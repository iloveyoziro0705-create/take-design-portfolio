<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8"/>
      <stop offset="100%" style="stop-color:#EDE7DB"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8935A"/>
      <stop offset="100%" style="stop-color:#C9A96E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle pattern overlay -->
  <rect width="800" height="450" fill="none" stroke="#CFC5B4" stroke-width="0.5" opacity="0.3"/>

  <!-- Gold top accent bar -->
  <rect x="0" y="0" width="800" height="3" fill="url(#gold)"/>

  <!-- Left decorative vertical line -->
  <rect x="80" y="60" width="1" height="330" fill="#C9A96E" opacity="0.4"/>

  <!-- Right decorative vertical line -->
  <rect x="720" y="60" width="1" height="330" fill="#C9A96E" opacity="0.4"/>

  <!-- Horizontal decorative lines -->
  <line x1="80" y1="60" x2="720" y2="60" stroke="#C9A96E" stroke-width="0.5" opacity="0.4"/>
  <line x1="80" y1="390" x2="720" y2="390" stroke="#C9A96E" stroke-width="0.5" opacity="0.4"/>

  <!-- Center content area -->
  <!-- Small EN label -->
  <text x="400" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="6" fill="#C9A96E" font-weight="400">HAIR SALON</text>

  <!-- LUMIA main logotype -->
  <text x="400" y="210" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" letter-spacing="14" fill="#1A1A1A" font-weight="400">LUMIA</text>

  <!-- Gold underline under LUMIA -->
  <rect x="270" y="220" width="260" height="1.5" fill="url(#gold)" opacity="0.8"/>

  <!-- Japanese subtitle -->
  <text x="400" y="258" text-anchor="middle" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="12" letter-spacing="4" fill="#7A6E63">髪質改善特化 × 完全予約制サロン</text>

  <!-- Features row -->
  <text x="230" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="9" letter-spacing="2" fill="#C9A96E">HAIR CARE</text>
  <text x="230" y="325" text-anchor="middle" font-family="'Hiragino Kaku Gothic Pro', sans-serif" font-size="10" fill="#7A6E63">髪質改善</text>

  <text x="400" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="9" letter-spacing="2" fill="#C9A96E">PRIVATE</text>
  <text x="400" y="325" text-anchor="middle" font-family="'Hiragino Kaku Gothic Pro', sans-serif" font-size="10" fill="#7A6E63">完全個室</text>

  <text x="570" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="9" letter-spacing="2" fill="#C9A96E">LINE BOOKING</text>
  <text x="570" y="325" text-anchor="middle" font-family="'Hiragino Kaku Gothic Pro', sans-serif" font-size="10" fill="#7A6E63">24時間予約</text>

  <!-- Dots between features -->
  <circle cx="315" cy="317" r="2" fill="#C9A96E" opacity="0.5"/>
  <circle cx="485" cy="317" r="2" fill="#C9A96E" opacity="0.5"/>

  <!-- Bottom location text -->
  <text x="400" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="3" fill="#A39C95">SHIBUYA-KU, TOKYO</text>

  <!-- Corner ornaments -->
  <path d="M90 70 L90 80 M90 70 L100 70" stroke="#C9A96E" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M710 70 L710 80 M710 70 L700 70" stroke="#C9A96E" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M90 380 L90 370 M90 380 L100 380" stroke="#C9A96E" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M710 380 L710 370 M710 380 L700 380" stroke="#C9A96E" stroke-width="1" opacity="0.5" fill="none"/>
</svg>
