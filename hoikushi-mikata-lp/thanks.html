<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登録完了｜保育士のミカタ</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #f85f91;
      --pink-soft: #fff4f7;
      --pink-light: #ffd6e2;
      --text: #3f3f46;
      --sub: #747474;
      --line: #f0dce3;
      --yellow: #ffbd3a;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Noto Sans JP", sans-serif;
      color: var(--text); background: var(--pink-soft);
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    a { text-decoration: none; color: inherit; }

    .card {
      background: #fff; border: 1px solid var(--line);
      border-radius: 32px; padding: 52px 44px;
      max-width: 520px; width: 100%; text-align: center;
      box-shadow: 0 24px 64px rgba(248,95,145,.18);
    }
    .icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--pink-soft); border: 2px solid var(--pink-light);
      display: grid; place-items: center;
      font-size: 40px; margin: 0 auto 24px;
    }
    h1 { font-size: clamp(22px, 5vw, 30px); color: #333; margin-bottom: 12px; }
    p { color: var(--sub); line-height: 1.85; margin-bottom: 8px; }
    .steps-mini {
      display: grid; gap: 10px; margin: 28px 0;
      text-align: left;
    }
    .step-item {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--pink-soft); border: 1px solid var(--line);
      border-radius: 14px; padding: 14px 16px;
    }
    .step-badge {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
      background: var(--pink); color: #fff;
      font-weight: 900; font-size: 12px;
      display: grid; place-items: center;
    }
    .step-item p { color: var(--text); font-weight: 700; margin: 0; font-size: 14px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; padding: 16px 32px; border-radius: 999px;
      background: linear-gradient(135deg, var(--pink), #ff8ab0);
      color: #fff; font-weight: 900; font-size: 15px;
      box-shadow: 0 12px 32px rgba(248,95,145,.28);
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 18px 42px rgba(248,95,145,.36); }
    .back-link { display: block; margin-top: 16px; color: var(--sub); font-size: 13px; }
    .back-link:hover { color: var(--pink); }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; border-radius: 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">☺</div>
    <h1>登録ありがとうございます！</h1>
    <p>保育士のミカタへようこそ。<br>これで口コミ・ランキング・比較機能がすべて無料でお使いいただけます。</p>

    <div class="steps-mini">
      <div class="step-item">
        <div class="step-badge">1</div>
        <p>気になる保育園の名前やエリアで検索する</p>
      </div>
      <div class="step-item">
        <div class="step-badge">2</div>
        <p>働いた保育士の口コミを読んでリアルを確認</p>
      </div>
      <div class="step-item">
        <div class="step-badge">3</div>
        <p>ランキング・比較で納得のいく園を選ぶ</p>
      </div>
    </div>

    <a href="#" class="btn">さっそく口コミを見る</a>
    <a href="index.html" class="back-link">← トップページへ戻る</a>
  </div>
</body>
</html>
