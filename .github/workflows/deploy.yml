# ============================================================
#  TAKE Design Portfolio — Vercel 自動デプロイ
# ============================================================
#
#  【初回セットアップ手順】
#  GitHubリポジトリの Settings → Secrets and variables → Actions
#  に以下のシークレットを登録してください。
#
#  VERCEL_TOKEN          : vercel.com/account/tokens で発行
#  VERCEL_ORG_ID         : Vercel Settings → General → Team ID
#  VERCEL_PROJECT_ID_RAPAS : rapas-lp プロジェクトの Project ID
#
#  Secretsを設定したら、GitHubの Actions タブ → Deploy to Vercel
#  → "Run workflow" ボタンで手動実行してください。
#
#  ※ 新しいLPを追加するたびに
#     1. Vercel でプロジェクトを作成（Root Directory = LP名）
#     2. Project ID を GitHub Secrets に追加
#     3. このファイルに新しいジョブをコピーして追加
#
# ============================================================

name: Deploy to Vercel

on:
  workflow_dispatch:
    # Secretsを設定してから手動で実行してください
    # GitHub Settings → Secrets and variables → Actions
    # 必要なSecrets: VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID_RAPAS

jobs:

  # ─────────────────────────────────────────────
  #  rapas-lp
  # ─────────────────────────────────────────────
  deploy-rapas-lp:
    name: "Deploy rapas-lp"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy rapas-lp to Vercel (Production)
        working-directory: ./rapas-lp
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_RAPAS }}
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

